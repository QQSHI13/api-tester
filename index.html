<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester - HTTP Client in Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --get: #238636;
            --post: #8957e5;
            --put: #9e6a03;
            --delete: #da3633;
            --patch: #d29922;
        }
        body {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 span { color: var(--accent); }
        
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
        }
        
        .panel {
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            background: var(--surface);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-content {
            flex: 1;
            overflow: auto;
            padding: 16px;
        }
        
        /* Request Panel */
        .url-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .method-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .method-select option[value="GET"] { color: var(--get); }
        .method-select option[value="POST"] { color: var(--post); }
        .method-select option[value="PUT"] { color: var(--put); }
        .method-select option[value="DELETE"] { color: var(--delete); }
        .method-select option[value="PATCH"] { color: var(--patch); }
        
        .url-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .url-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .send-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Headers */
        .headers-list { display: flex; flex-direction: column; gap: 8px; }
        .header-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 8px;
            align-items: center;
        }
        .header-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .header-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
        }
        .delete-btn:hover { color: var(--delete); background: rgba(218, 54, 51, 0.1); }
        .add-btn {
            background: var(--surface-hover);
            border: 1px dashed var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .add-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        /* Body Editor */
        .body-editor {
            width: 100%;
            min-height: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 16px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            line-height: 1.6;
            resize: vertical;
        }
        .body-editor:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        /* Response Panel */
        .response-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .meta-item {
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .meta-item .label { color: var(--text-secondary); margin-right: 8px; }
        .meta-item .value { font-weight: 600; }
        .status-2xx { color: var(--get); }
        .status-3xx { color: var(--put); }
        .status-4xx { color: var(--patch); }
        .status-5xx { color: var(--delete); }
        
        .response-body {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .response-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            max-height: 400px;
        }
        
        /* Presets */
        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .preset-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: inherit;
        }
        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* Loading */
        .loading {
            display: none;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }
        .loading.active { display: flex; }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* JSON highlighting */
        .json-key { color: #7ee787; }
        .json-string { color: #a5d6ff; }
        .json-number { color: #79c0ff; }
        .json-boolean { color: #ff7b72; }
        .json-null { color: #ff7b72; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>⚡</span> API Tester</h1>
    </div>
    
    <div class="main">
        <!-- Request Panel -->
        <div class="panel">
            <div class="panel-header">Request</div>
            <div class="panel-content">
                <div class="url-bar">
                    <select class="method-select" id="method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="PATCH">PATCH</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                    <input type="text" class="url-input" id="url" placeholder="https://api.example.com/users" 
                           value="https://jsonplaceholder.typicode.com/posts/1">
                    <button class="send-btn" id="sendBtn" onclick="sendRequest()">Send</button>
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('headers')">Headers</button>
                    <button class="tab" onclick="switchTab('body')">Body</button>
                </div>
                
                <div class="tab-content active" id="headers-tab">
                    <div class="headers-list" id="headersList">
                        <div class="header-row">
                            <input type="text" class="header-input" placeholder="Content-Type" value="Content-Type">
                            <input type="text" class="header-input" placeholder="application/json" value="application/json">
                            <button class="delete-btn" onclick="removeHeader(this)">✕</button>
                        </div>
                    </div>
                    <button class="add-btn" onclick="addHeader()">+ Add Header</button>
                </div>
                
                <div class="tab-content" id="body-tab">
                    <textarea class="body-editor" id="body" placeholder='{"key": "value"}'>{
  "title": "foo",
  "body": "bar",
  "userId": 1
}</textarea>
                </div>
                
                <div class="presets">
                    <button class="preset-btn" onclick="loadPreset('jsonplaceholder')">🧪 JSON Placeholder</button>
                    <button class="preset-btn" onclick="loadPreset('httpbin')">📦 HTTPBin</button>
                    <button class="preset-btn" onclick="loadPreset('github')">🐙 GitHub API</button>
                    <button class="preset-btn" onclick="loadPreset('reqres')">👤 ReqRes</button>
                </div>
            </div>
        </div>
        
        <!-- Response Panel -->
        <div class="panel">
            <div class="panel-header">
                Response
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <span>Sending...</span>
                </div>
            </div>
            <div class="panel-content">
                <div class="response-meta" id="responseMeta" style="display: none;">
                    <div class="meta-item">
                        <span class="label">Status:</span>
                        <span class="value" id="statusCode">200</span>
                    </div>
                    <div class="meta-item">
                        <span class="label">Time:</span>
                        <span class="value" id="responseTime">0ms</span>
                    </div>
                    <div class="meta-item">
                        <span class="label">Size:</span>
                        <span class="value" id="responseSize">0 B</span>
                    </div>
                </div>
                
                <div class="response-body" id="responseBody" style="display: none;">
                    <pre id="responseContent"></pre>
                </div>
                
                <div id="emptyState" style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                    <div style="font-size: 3rem; margin-bottom: 16px;">📡</div>
                    <p>Send a request to see the response</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const presets = {
            jsonplaceholder: {
                url: 'https://jsonplaceholder.typicode.com/posts',
                method: 'GET'
            },
            httpbin: {
                url: 'https://httpbin.org/get',
                method: 'GET'
            },
            github: {
                url: 'https://api.github.com/users/github',
                method: 'GET'
            },
            reqres: {
                url: 'https://reqres.in/api/users/2',
                method: 'GET'
            }
        };
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        function addHeader() {
            const row = document.createElement('div');
            row.className = 'header-row';
            row.innerHTML = `
                <input type="text" class="header-input" placeholder="Header">
                <input type="text" class="header-input" placeholder="Value">
                <button class="delete-btn" onclick="removeHeader(this)">✕</button>
            `;
            document.getElementById('headersList').appendChild(row);
        }
        
        function removeHeader(btn) {
            btn.parentElement.remove();
        }
        
        function loadPreset(name) {
            const p = presets[name];
            document.getElementById('url').value = p.url;
            document.getElementById('method').value = p.method;
        }
        
        async function sendRequest() {
            const url = document.getElementById('url').value;
            const method = document.getElementById('method').value;
            const body = document.getElementById('body').value;
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            // Show loading
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('responseMeta').style.display = 'none';
            document.getElementById('responseBody').style.display = 'none';
            
            const startTime = performance.now();
            
            try {
                // Build headers
                const headers = {};
                document.querySelectorAll('.header-row').forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    if (inputs[0].value) {
                        headers[inputs[0].value] = inputs[1].value;
                    }
                });
                
                const options = {
                    method: method,
                    headers: headers
                };
                
                if (['POST', 'PUT', 'PATCH'].includes(method) && body) {
                    options.body = body;
                }
                
                const response = await fetch(url, options);
                const responseText = await response.text();
                const endTime = performance.now();
                
                // Display response
                document.getElementById('statusCode').textContent = `${response.status} ${response.statusText}`;
                document.getElementById('statusCode').className = 'value ' + getStatusClass(response.status);
                document.getElementById('responseTime').textContent = Math.round(endTime - startTime) + 'ms';
                document.getElementById('responseSize').textContent = formatSize(new Blob([responseText]).size);
                
                // Format JSON if possible
                let formatted = responseText;
                try {
                    const json = JSON.parse(responseText);
                    formatted = syntaxHighlight(JSON.stringify(json, null, 2));
                } catch {
                    formatted = escapeHtml(responseText);
                }
                
                document.getElementById('responseContent').innerHTML = formatted;
                document.getElementById('responseMeta').style.display = 'flex';
                document.getElementById('responseBody').style.display = 'block';
                
            } catch (error) {
                document.getElementById('statusCode').textContent = 'Error';
                document.getElementById('statusCode').className = 'value status-5xx';
                document.getElementById('responseContent').textContent = error.message;
                document.getElementById('responseMeta').style.display = 'flex';
                document.getElementById('responseBody').style.display = 'block';
            } finally {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }
        
        function getStatusClass(status) {
            if (status >= 200 && status < 300) return 'status-2xx';
            if (status >= 300 && status < 400) return 'status-3xx';
            if (status >= 400 && status < 500) return 'status-4xx';
            return 'status-5xx';
        }
        
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function syntaxHighlight(json) {
            return json.replace(/(".*?")/g, '<span class="json-string">$1</span>')
                .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
                .replace(/\b(null)\b/g, '<span class="json-null">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="json-number">$1</span>')
                .replace(/(".*?")(?=:)/g, '<span class="json-key">$1</span>');
        }
        
        // Enter to send
        document.getElementById('url').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendRequest();
        });
    </script>
</body>
</html>
